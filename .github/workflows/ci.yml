name: CI/CD Pipeline - Automated Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ GitHub về máy chủ giả lập
    - name: Checkout Code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Bước 3: Chạy kiểm thử tự động (Selenium - Java)
    - name: Run Selenium Functional Tests
      run: |
        echo "Bắt đầu chạy kiểm thử chức năng tự động với Selenium..."
        cd SeleniumTesting
        mvn clean test
      continue-on-error: true

    # Bước 4: Lưu lại báo cáo kết quả (Nếu có)
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: Selenium-Reports
        path: SeleniumTesting/target/surefire-reports/
